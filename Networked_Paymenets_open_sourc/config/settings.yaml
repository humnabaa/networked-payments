# Dataset schema mapping — edit these to match your data's column names
schema:
  source_column: "Payer (2-digit SIC)"
  destination_column: "Payee (2-digit SIC)"
  value_column: "Value (£)"
  time_column: "Date"
  sic_code_column: null  # SIC codes are the source/target values themselves
  # ONS Excel format settings
  ons_excel:
    sheet_name: "SIC2_2019_2025"
    skip_rows: 8        # Header rows before data
    extra_header_row: 1 # Additional column-name row within data

# Industry categories for visualization (SIC code ranges)
industry_categories:
  "Financial & Business":
    color: "#e41a1c"
    sic_ranges: [[64, 66], [69, 71], [77, 82]]
  "Manufacturing":
    color: "#377eb8"
    sic_ranges: [[10, 33]]
  "Trade & Distribution":
    color: "#4daf4a"
    sic_ranges: [[45, 47], [49, 53]]
  "Public & Social":
    color: "#ff7f00"
    sic_ranges: [[84, 88], [90, 93]]
  "Primary Industries":
    color: "#984ea3"
    sic_ranges: [[1, 9]]
  "Construction & Real Estate":
    color: "#a65628"
    sic_ranges: [[41, 43], [68, 68]]
  "Other Services":
    color: "#999999"
    sic_ranges: []  # Fallback for unmatched

# Model hyperparameters
model:
  random_state: 42
  rf_params:
    n_estimators: 200
    max_depth: 10
    min_samples_leaf: 5
  gbm_params:
    n_estimators: 200
    learning_rate: 0.1
    max_depth: 5
    min_samples_leaf: 5
  min_expanding_window: 4  # Minimum quarters for training

# Period boundaries for temporal analysis (Table 3)
periods:
  pre_pandemic: ["2019-Q1", "2019-Q4"]
  pandemic: ["2020-Q1", "2021-Q4"]
  recovery: ["2022-Q1", "2025-Q1"]

# Visualization settings
visualization:
  max_edges_displayed: 300
  node_size_range: [8, 40]
  edge_width_range: [0.3, 3.0]
  layout_seed: 42
  layout_k: 0.3  # spring_layout repulsion
